name: Trading Bot

on:
  schedule:
    - cron: '0 */2 * * *'   # Bot trading utama tiap 2 jam
    - cron: '*/5 * * * *'   # Telegram listener tiap 5 menit
  workflow_dispatch:

jobs:
  run-bot:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */2 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install httpx anthropic openai python-dotenv pandas numpy ta ccxt yfinance aiohttp requests
      - name: Create .env
        run: |
          echo "QWEN_API_KEY=${{ secrets.QWEN_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GROK_API_KEY=${{ secrets.GROK_API_KEY }}" >> .env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "TRADING_MODE=paper" >> .env
      - name: Run trading bot
        run: python bot.py
        timeout-minutes: 10
      - name: Commit trade logs
  run: |
    git config user.email "bot@trading.com"
    git config user.name "Trading Bot"
    git add logs/
    git diff --staged --quiet || git commit -m "bot: update logs"
    git push || true

  telegram-listener:
    if: github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests python-dotenv
      - name: Create .env
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
      - name: Run Telegram listener
        run: python telegram_listener.py
        timeout-minutes: 4
