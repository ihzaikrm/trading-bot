name: AI Trading Bot

on:
  schedule:
    # Berjalan otomatis setiap 1 jam (pada menit ke-0)
    - cron: '0 * * * *'
  workflow_dispatch:
    # Tetap menyediakan tombol manual untuk testing

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Penting agar bot bisa menyimpan log trading

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas yfinance httpx python-dotenv requests

      - name: Run Trading Bot
        run: python bot.py
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADING_MODE: 'paper'

      - name: Save Trade Logs
        # Langkah ini agar paper_trades.json tidak terhapus setelah bot selesai
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/paper_trades.json
          git commit -m "Auto-update logs [skip ci]" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}